name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  check_commit:
    name: Check Commit Message
    runs-on: windows-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.check.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit message
        id: check
        run: |
          # 获取最新的 commit message
          $commitMessage = git log -1 --pretty=%B
          
          # 检查是否包含版本号格式 v xxx.xxx.xxx
          if ($commitMessage -match "v\s+\d+\.\d+\.\d+") {
            if ($matches) {
              $version = $matches[0] -replace "v\s+", ""
              echo "should_build=true" >> $env:GITHUB_OUTPUT
              echo "version=$version" >> $env:GITHUB_OUTPUT
              echo "检测到版本号: $version"
            } else {
              echo "should_build=false" >> $env:GITHUB_OUTPUT
              echo "version=latest" >> $env:GITHUB_OUTPUT
              echo "未检测到版本号，仅进行代码检查"
            }
          } else {
            echo "should_build=false" >> $env:GITHUB_OUTPUT
            echo "version=latest" >> $env:GITHUB_OUTPUT
            echo "未检测到版本号，仅进行代码检查"
          }

  check:
    name: Code Check
    runs-on: windows-latest
    needs: check_commit
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Type check backend
        run: |
          cd backend
          pnpm exec tsc --noEmit

      - name: Type check frontend
        run: |
          cd front
          pnpm exec vue-tsc --noEmit

  build:
    name: Build Windows
    runs-on: windows-latest
    needs: check_commit
    if: needs.check_commit.outputs.should_build == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install

      - name: Build backend
        run: pnpm run backend

      - name: Copy backend to frontend
        run: pnpm run back2front

      - name: Build frontend
        run: pnpm run tauri

      - name: Move build to root
        run: pnpm run build2root

      - name: Generate changelog
        id: changelog
        run: |
          # 获取上一个 tag
          $previousTag = git describe --tags --abbrev=0 HEAD^ 2>$null
          if ($LASTEXITCODE -ne 0) {
            $previousTag = ""
          }
          
          # 获取当前版本
          $currentVersion = "${{ needs.check_commit.outputs.version }}"
          
          # 生成更新日志
          $changelog = "## v$currentVersion`n`n"
          
          if ($previousTag) {
            $commits = git log $previousTag..HEAD --pretty=format:"%h|%an|%ae|%s" --no-merges
          } else {
            $commits = git log HEAD --pretty=format:"%h|%an|%ae|%s" --no-merges -20
          }
          
          if ($commits) {
            $changelog += "### 变更内容`n`n"
            foreach ($commit in $commits) {
              $parts = $commit -split '\|'
              $hash = $parts[0]
              $author = $parts[1]
              $email = $parts[2]
              $message = $parts[3]
              
              $changelog += "- $message (@$author)`n"
            }
          } else {
            $changelog += "### 变更内容`n`n"
            $changelog += "- 首次发布`n"
          }
          
          $changelog | Out-File -FilePath changelog.md -Encoding UTF8
          
          # 输出到环境变量
          $changelogContent = Get-Content changelog.md -Raw
          $changelogContent = $changelogContent -replace "`n", "%0A"
          echo "changelog=$changelogContent" >> $env:GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DeEarthX-V3-${{ needs.check_commit.outputs.version }}-windows
          path: |
            DeEarthX-V3_x64-setup.exe
            DeEarthX-V3_x64-setup.zip

      - name: Create tag
        run: |
          $tagName = "v${{ needs.check_commit.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a $tagName -m "Release $tagName"
          git push origin $tagName
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check_commit.outputs.version }}
          files: |
            DeEarthX-V3_x64-setup.exe
            DeEarthX-V3_x64-setup.zip
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
